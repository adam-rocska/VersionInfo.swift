name: CI

on:
  push:
  pull_request:

jobs:
  linux:
    name: Linux Swift ${{ matrix.swift }}
    runs-on: ubuntu-latest
    container: swift:${{ matrix.swift }}
    strategy:
      fail-fast: false
      matrix:
        swift:
          - "6.0"
          - "6.1"
          - "6.2"

    steps:
      - uses: actions/checkout@v4
      - run: swift --version
      - run: swift build
      - run: swift test
      - run: swift test -c release

  macos:
    name: macOS
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4
      - run: swift --version
      - run: swift build
      - run: swift test
      - run: swift test -c release
