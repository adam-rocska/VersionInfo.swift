name: Documentation issue
description: Report unclear, missing, or incorrect documentation.
title: "[Docs]: "
labels: ["documentation", "needs-triage"]
body:
  - type: textarea
    id: location
    attributes:
      label: Location
      description: Link or name the README, DocC page, symbol, or section.
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What is unclear, missing, or wrong?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Desired documentation behavior
      description: What should a reader understand after the change?
    validations:
      required: true
  - type: dropdown
    id: reader
    attributes:
      label: Reader type
      options:
        - First-time plugin user
        - Library-only user
        - Plugin and library user
        - Maintainer or contributor
        - Release engineer
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Preflight
      options:
        - label: I checked the README and DocC pages.
          required: true
